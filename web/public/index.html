<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Temple Run | Dungeon Access</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="dungeon-overlay"></div>

<div class="card">
    <header>
        <div class="idol-icon"></div>
        <h1>TEMPLE RUN</h1>
        <p class="subtitle">MAZMORRA DE ACCESO</p>
    </header>

    <main>
        <div id="seccion-login" class="form-fade">
            <div class="input-container">
                <input type="text" id="login-nombre" required>
                <label>NOMBRE DEL EXPLORADOR</label>
                <div class="bar"></div>
            </div>
            <div class="input-container">
                <input type="password" id="login-pass" required>
                <label>CONTRASEÑA</label>
                <div class="bar"></div>
            </div>
            <button class="btn-primary" onclick="hacerLogin()">DESCENDER</button>
            <p class="switch-text">¿Eres nuevo? <span onclick="cambiarVista('registro')">CREA UN AVATAR</span></p>
        </div>

        <div id="seccion-registro" class="form-fade hidden">
            <div class="input-container">
                <input type="text" id="reg-nombre" required>
                <label>NUEVO ALIAS</label>
                <div class="bar"></div>
            </div>
            <div class="input-container">
                <input type="password" id="reg-pass" required>
                <label>CONTRASEÑA</label>
                <div class="bar"></div>
            </div>

            <div class="input-container">
                <input type="password" id="reg-pass-confirm" required>
                <label>CONFIRMAR CONTRASEÑA</label>
                <div class="bar"></div>
            </div>

            <div class="input-container">
                <input type="email" id="reg-correo" required>
                <label>CORREO ELECTRÓNICO</label>
                <div class="bar"></div>
            </div>
            <button class="btn-primary" onclick="hacerRegistro()">UNIRSE A LA EXPEDICIÓN</button>
            <p class="switch-text">¿Ya tienes cuenta? <span onclick="cambiarVista('login')">VOLVER</span></p>
        </div>

        <div id="seccion-dashboard" class="form-fade hidden">

            <div class="dashboard-header" style="text-align: center; border-bottom: 2px solid gold; padding-bottom: 15px; margin-bottom: 20px;">
                <h2 id="mensaje-bienvenida" style="color: white; font-family: 'Cinzel', serif; margin-bottom: 5px;">CAMPAMENTO BASE</h2>
                <p style="color: gold; font-size: 1.2em; font-weight: bold; margin: 0;">🪙 Monedas: <span id="contador-monedas">0</span></p>
                <button class="btn-primary" style="background-color: #d35400; border-color: #e67e22; margin-top: 15px;" onclick="abrirUnity()">🏃 ADENTRARSE EN LA MAZMORRA</button>
            </div>

            <div class="tabs-menu" style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button id="btn-perfil" class="tab-btn active" onclick="cambiarPestana('tab-perfil', 'btn-perfil')">Perfil</button>
                <button id="btn-tienda" class="tab-btn" onclick="cambiarPestana('tab-tienda', 'btn-tienda')">Tienda</button>
                <button id="btn-inventario" class="tab-btn" onclick="cambiarPestana('tab-inventario', 'btn-inventario')">Mochila</button>
            </div>

            <div id="tab-tienda" class="tab-content">
                <h3 style="color: white; text-align: center;">Bienes del Mercader</h3>

                <div id="contenedor-items-tienda" style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
                </div>
            </div>

            <div id="tab-inventario" class="tab-content" style="display: none;">
                <h3 style="color: white; text-align: center;">Tus Pertinencias</h3>
                <p style="color: #aaa; text-align: center;">Cargando inventario desde el servidor...</p>
            </div>

            <div id="tab-perfil" class="tab-content" style="display: none;">
                <h3 style="color: white; text-align: center;">Datos del Explorador</h3>
                <p style="color: white;">Nombre: <span id="perfil-nombre"></span></p>
                <button class="btn-primary" style="background: transparent; border: 1px solid red; color: red;" onclick="cerrarSesion()">Abandonar Campamento (Cerrar Sesión)</button>
            </div>

        </div>

    </main>

    <footer id="mensaje-sistema"></footer>
</div>

<script src="script.js?v=2"></script>
</body>
</html>
